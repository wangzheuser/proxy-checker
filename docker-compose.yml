services:
  proxy-checker:
    build:
      context: .
      dockerfile: Dockerfile
    image: proxy-checker:local
    container_name: proxy-checker
    restart: unless-stopped
    working_dir: /app
    command: ["python", "server.py"]
    ports:
      - "${PROXY_CHECKER_PORT:-8888}:8888"
    environment:
      - PORT=8888
      - TZ=${TZ:-Asia/Shanghai}
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Shanghai}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:-change-this-secret}
      - AUTH_PASSWORD
    volumes:
      - proxy-checker-data:/app
    shm_size: "1gb"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8888/api/capabilities', data=b'{}', headers={'Content-Type':'application/json'}, method='POST'); urllib.request.urlopen(req, timeout=5).read()\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  proxy-checker-data:
